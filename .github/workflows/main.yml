name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Cordova (App Builder)
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        cordova create myapp com.chibilingo.app ChibiLingo
        cd myapp
        cordova platform add android
        rm -rf www/*
        cp ../index.html www/
        
        # Yeh settings aapke buttons aur touch ko activate kar dengi (Security bypass)
        rm -f config.xml
        echo '<?xml version="1.0" encoding="utf-8"?>' > config.xml
        echo '<widget id="com.chibilingo.app" version="1.0.0" xmlns="http://www.w3.org/ns/widgets">' >> config.xml
        echo '    <name>ChibiLingo</name>' >> config.xml
        echo '    <content src="index.html" />' >> config.xml
        echo '    <access origin="*" />' >> config.xml
        echo '    <allow-intent href="http://*/*" />' >> config.xml
        echo '    <allow-intent href="https://*/*" />' >> config.xml
        echo '    <allow-navigation href="*" />' >> config.xml
        echo '    <preference name="AllowInlineMediaPlayback" value="true" />' >> config.xml
        echo '    <preference name="BackupWebStorage" value="none" />' >> config.xml
        echo '</widget>' >> config.xml

    - name: Build Android App
      run: |
        cd myapp
        cordova build android --debug

    - name: Upload APK File
      uses: actions/upload-artifact@v4
      with:
        name: ChibiLingo-App
        path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
        
