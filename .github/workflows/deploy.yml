name: Deploy LinguaQuest to GitHub Pages

on:
  push:
    branches:
      - main # जब भी आप मेन ब्रांच में कोड पुश करेंगे, यह ऑटोमैटिक डिप्लॉय हो जाएगा

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # आपकी सभी स्टेटिक फ़ाइलें इसी रूट डायरेक्टरी में हैं

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
